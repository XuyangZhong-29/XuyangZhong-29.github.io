<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xuyang Zhong · Homepage</title>
  <meta name="description" content="Homepage of Mingyuan Zhang — research, publications and news." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Top navigation -->
  <header class="nav" id="nav">
    <div class="nav__inner">
      <a href="#home" class="nav__brand" data-brand></a>
      <nav class="nav__links">
        <a href="#about" class="nav__link">About</a>
        <a href="#news" class="nav__link">News</a>
        <a href="#publications" class="nav__link">Publications</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle light/dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="nav__burger" id="burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main>
    <!-- Hero / profile -->
    <section class="hero" id="home">
      <div class="hero__blob hero__blob--1"></div>
      <div class="hero__blob hero__blob--2"></div>
      <div class="hero__blob hero__blob--3"></div>
      <div class="hero__inner reveal" id="hero"></div>
    </section>

    <!-- About -->
    <section class="section" id="about">
      <div class="section__head reveal">
        <span class="section__eyebrow">About</span>
        <h2 class="section__title">About Me</h2>
      </div>
      <div class="about reveal">
        <div class="about__bio" id="aboutBio"></div>
        <aside class="about__side">
          <div class="card">
            <h3 class="card__title">Research Interests</h3>
            <div class="tags" id="interests"></div>
          </div>
        </aside>
      </div>
    </section>

    <!-- News -->
    <section class="section section--alt" id="news">
      <div class="section__head reveal">
        <span class="section__eyebrow">News</span>
        <h2 class="section__title">Latest News</h2>
      </div>
      <ul class="news" id="news-list"></ul>
    </section>

    <!-- Publications -->
    <section class="section" id="publications">
      <div class="section__head reveal">
        <span class="section__eyebrow">Publications</span>
        <h2 class="section__title">Publications</h2>
        <em>* indicates equal contribution.</em>
      </div>
      <div class="pub-filters reveal" id="pubFilters"></div>
      <ol class="pubs" id="pub-list"></ol>
    </section>
  </main>

  <footer class="footer">
    <p id="footerCopy"></p>
    <p class="footer__note" id="footerNote"></p>
  </footer>

  <a href="#home" class="to-top" id="toTop" aria-label="Back to top">↑</a>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
